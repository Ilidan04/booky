<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Livre - ÉduLivres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F7F1E8; --amber: #C8973A; --navy: #0B1728;
            --gold: #D4A853; --slate-text: #94A3B8;
        }
        body { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .nav-link {
            font-size:.875rem; font-weight:500; color:#374151;
            text-decoration:none; letter-spacing:.02em;
            padding-bottom:2px; border-bottom:2px solid transparent;
            transition:color .2s, border-color .2s;
        }
        .nav-link:hover { color:var(--amber); border-bottom-color:var(--amber); }
        .mobile-menu { display:none; }
        .mobile-menu.active { display:block; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50" style="box-shadow:0 1px 12px rgba(0,0,0,.06);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center" style="height:4.25rem;">
                <a href="index.html"><img src="images/book.webp" alt="Bookup Logo" class="h-10 w-auto object-contain"></a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="index.html"         class="nav-link">Accueil</a>
                    <a href="magazine.html"      class="nav-link">Magazine</a>
                    <a href="apropos.html"       class="nav-link">À propos</a>
                    <a href="index.html#contact" class="nav-link">Contact</a>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="focus:outline-none" style="color:#555;">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="mobile-menu md:hidden pb-4 border-t border-gray-100">
                <a href="index.html"         class="block py-2.5 text-sm font-medium text-gray-600">Accueil</a>
                <a href="magazine.html"      class="block py-2.5 text-sm font-medium text-gray-600">Magazine</a>
                <a href="apropos.html"       class="block py-2.5 text-sm font-medium text-gray-600">À propos</a>
                <a href="index.html#contact" class="block py-2.5 text-sm font-medium text-gray-600">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Book Details Section -->
    <section class="py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 id="bookTitle" class="text-3xl sm:text-4xl font-bold text-center mb-8"></h2>

            <!-- Image Viewer -->
            <div class="mb-8">
                <img id="bookPageImage" src="" alt="Page du livre" class="mx-auto rounded-lg shadow-lg block" style="max-width:100%;height:auto;">
            </div>

            <!-- Audio Player Section -->
            <div id="audioSection" class="max-w-4xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div id="audioLeft">
                        <h3 class="text-xl font-semibold mb-2">En français</h3>
                        <audio id="audioFrLeft" controls class="w-full mb-4"></audio>
                        <h3 class="text-xl font-semibold mb-2">In English</h3>
                        <audio id="audioEnLeft" controls class="w-full"></audio>
                    </div>
                    <div id="audioRight">
                        <h3 class="text-xl font-semibold mb-2">En français</h3>
                        <audio id="audioFrRight" controls class="w-full mb-4"></audio>
                        <h3 class="text-xl font-semibold mb-2">In English</h3>
                        <audio id="audioEnRight" controls class="w-full"></audio>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="flex justify-center items-center mt-8"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-10 mt-12" style="background:var(--navy);">
        <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <img src="images/logoo.png" alt="Bookup" class="h-9 w-auto opacity-80 object-contain">
            <p class="text-sm order-3 sm:order-2" style="color:var(--slate-text);">&copy; 2026 Bookup — Tous droits réservés.</p>
            <p class="text-xs order-2 sm:order-3 font-medium" style="color:var(--gold);opacity:.7;letter-spacing:.14em;text-transform:uppercase;">L'éducation est la clé</p>
        </div>
    </footer>

    <script>
        const bookData = {
            "Le réveillon du nouvel an": {
                pages: 6,
                audio_count: 10
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const bookTitle = sessionStorage.getItem('selectedBook');
            let currentPage = parseInt(urlParams.get('page')) || 1;

            const book = bookData[bookTitle];
            if (!book) {
                // Handle book not found
                document.getElementById('bookTitle').textContent = "Livre non trouvé";
                return;
            }

            document.getElementById('bookTitle').textContent = bookTitle;

            function displayPage(page) {
                // Update Image
                const pageImage = document.getElementById('bookPageImage');
                pageImage.src = `books/Histoire/pages/${page}.jpg`;

                // Update Audio
                const audioSection = document.getElementById('audioSection');
                const audioFrLeft = document.getElementById('audioFrLeft');
                const audioEnLeft = document.getElementById('audioEnLeft');
                const audioFrRight = document.getElementById('audioFrRight');
                const audioEnRight = document.getElementById('audioEnRight');

                const audioIndexStart = (page - 1) * 2 + 1;
                
                if (audioIndexStart <= book.audio_count) {
                    audioSection.style.display = 'block';

                    audioFrLeft.src = `books/Histoire/vocal/${audioIndexStart}.mp3`;
                    audioEnLeft.src = `books/Histoire/vocal/${audioIndexStart}.1.mp3`;

                    if (audioIndexStart + 1 <= book.audio_count) {
                        document.getElementById('audioRight').style.display = 'block';
                        audioFrRight.src = `books/Histoire/vocal/${audioIndexStart + 1}.mp3`;
                        audioEnRight.src = `books/Histoire/vocal/${audioIndexStart + 1}.1.mp3`;
                    } else {
                        document.getElementById('audioRight').style.display = 'none';
                    }
                } else {
                    audioSection.style.display = 'none';
                }
                
                // Update URL without reloading
                const newUrl = `${window.location.pathname}?page=${page}`;
                window.history.pushState({path: newUrl}, '', newUrl);

                renderPagination(page);
            }

            function renderPagination(activePage) {
                const paginationContainer = document.getElementById('pagination');
                paginationContainer.innerHTML = '';

                // Previous Button
                const prevButton = document.createElement('button');
                prevButton.textContent = 'Précédent';
                prevButton.className = 'mx-1 px-4 py-2 rounded bg-gray-200 font-medium text-sm';
                if (activePage === 1) {
                    prevButton.disabled = true;
                    prevButton.classList.add('opacity-50', 'cursor-not-allowed');
                }
                prevButton.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        displayPage(currentPage);
                    }
                });
                paginationContainer.appendChild(prevButton);

                // Page numbers
                for (let i = 1; i <= book.pages; i++) {
                    const pageButton = document.createElement('button');
                    pageButton.textContent = i;
                    pageButton.className = `mx-1 px-4 py-2 rounded font-medium text-sm ${i === activePage ? 'text-white' : 'bg-gray-200'}`;
                    if (i === activePage) pageButton.style.background = 'var(--amber)';
                    pageButton.addEventListener('click', () => {
                        currentPage = i;
                        displayPage(i);
                    });
                    paginationContainer.appendChild(pageButton);
                }

                // Next Button
                const nextButton = document.createElement('button');
                nextButton.textContent = 'Suivant';
                nextButton.className = 'mx-1 px-4 py-2 rounded bg-gray-200';
                if (activePage === book.pages) {
                    nextButton.disabled = true;
                    nextButton.classList.add('opacity-50', 'cursor-not-allowed');
                }
                nextButton.addEventListener('click', () => {
                    if (currentPage < book.pages) {
                        currentPage++;
                        displayPage(currentPage);
                    }
                });
                paginationContainer.appendChild(nextButton);
            }

            displayPage(currentPage);
        });
    </script>
</body>
</html>
